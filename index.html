<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AR API 測試 (Render版)</title>
</head>

<body style="background:#0f172a;color:white;font-family:Arial;padding:20px">

<h2>HF → Render API 測試</h2>

<input id="api" style="width:500px"
value="https://your-service.onrender.com"><br><br>

<input id="img" style="width:700px"
value="https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png"><br><br>

<button onclick="test()">測試 API</button>

<p id="status">狀態：待命</p>

<pre id="out"></pre>

<script>
async function test() {

    const api = document.getElementById("api").value;
    const img = document.getElementById("img").value;

    const status = document.getElementById("status");
    const out = document.getElementById("out");

    status.innerText = "請求中...";
    out.innerText = "";

    const start = performance.now();

    try {
        const res = await fetch(api + "/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                url: img
            })
        });

        const data = await res.json();

        const end = performance.now();

        status.innerText = `完成 ${(end - start).toFixed(0)}ms`;

        out.innerText = JSON.stringify(data, null, 2);

    } catch (e) {
        status.innerText = "失敗";
        out.innerText = e.toString();
    }
}
</script>

</body>
</html>
