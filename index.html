<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>HF API 測試器</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}
input, button {
    padding: 10px;
    margin: 5px;
}
pre {
    background: #111827;
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
}
button {
    cursor: pointer;
}
</style>
</head>

<body>

<h2>HF API 測試</h2>

<input id="space" style="width:400px"
       value="MichaelYo/my-ar-cloth-api" />

<br>

<input id="img" style="width:600px"
value="https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png"/>

<br>

<button onclick="testAPI()">測試 API</button>

<p id="status">狀態：尚未測試</p>

<pre id="result"></pre>

<script type="module">
import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client@1.10.0/+esm";

window.testAPI = async function () {

    const spaceId = document.getElementById("space").value;
    const img = document.getElementById("img").value;

    const status = document.getElementById("status");
    const result = document.getElementById("result");

    status.innerText = "連線中...";
    result.innerText = "";

    try {
        const app = await client(spaceId);

        status.innerText = "已連線，開始 predict...";

        const r = await app.predict("/predict", [img]);

        status.innerText = "完成";

        result.innerText = JSON.stringify(r, null, 2);

    } catch (e) {
        status.innerText = "失敗";
        result.innerText = e.toString();
    }
};
</script>

</body>
</html>
